name: Impact Machine Runway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    name: Generate AI Production Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run AI pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate.js

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ai/generated-copy.json public/production-status.json
          git diff --cached --quiet || git commit -m "chore: update AI-generated production assets [skip ci]"
          git push
