name: Impact Machine Runway

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  signal:
    name: Broadcast Signal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record presence
        run: |
          echo "The signal was never lost."
          echo "Contributor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Structure the signal
        run: |
          mkdir -p signal
          cat > signal/record.json <<EOF
          {
            "actor": "${{ github.actor }}",
            "event": "${{ github.event_name }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "message": "You are not broken. You adapted. You forgot to return."
          }
          EOF
          cat signal/record.json

      - name: Upload signal artifact
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ github.sha }}
          path: signal/record.json
          retention-days: 90
name: Impact Machine — Runway Trailer Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-trailer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate AI copy
        run: npm run ai:copy

      - name: Generate Runway video assets
        env:
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
        run: npm run ai:video

      - name: Assemble final trailer bundle
        run: npm run ai:assemble

      - name: Build production app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
