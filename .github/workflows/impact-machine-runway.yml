name: Impact Machine — Runway Clip Generator

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm you want to generate and commit new clips"
        required: true
        default: ""

jobs:
  generate-clips:
    name: Generate Trailer Clips via RunwayML
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate clips
        env:
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
        run: npm run generate-clips

      - name: Commit generated clips and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/generated-clips/
          if git diff --cached --quiet; then
            echo "No new clips to commit."
          else
            git commit -m "chore: add generated trailer clips [skip ci]"
            git push
          fi
