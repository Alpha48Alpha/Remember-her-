name: Impact Machine – Runway Video Generation

on:
  push:
    branches:
      - main
    paths:
      - shots.json
  workflow_dispatch:
    inputs:
      shot_id:
        description: 'Specific shot ID to generate (e.g. shot_01). Leave blank to generate all shots.'
        required: false
        default: ''

jobs:
  generate-shots:
    name: Generate Shots via Runway ML
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate video shots
        env:
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          SHOT_ID_FILTER: ${{ github.event.inputs.shot_id }}
        run: python .github/scripts/generate_shots.py

      - name: Upload generated videos
        uses: actions/upload-artifact@v4
        with:
          name: generated-shots
          path: output/
          retention-days: 7
